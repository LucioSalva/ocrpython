[alembic]
# This config is intended for host-side runs from the `backend/` directory
# (e.g. `cd backend && alembic upgrade head`).
# When running inside the container, prefer `app/alembic.ini` instead.
script_location = %(here)s/app/alembic
prepend_sys_path = %(here)s
version_path_separator = os
sqlalchemy.url = postgresql+psycopg://placeholder:placeholder@db:5432/placeholder

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
